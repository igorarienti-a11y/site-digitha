    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-bg: #06060b;
            --color-bg-card: #111119;
            --color-border: rgba(255,255,255,0.06);
            --color-accent: #E8521A;
            --color-accent-glow: rgba(232,82,26,0.15);
            --color-accent-glow-strong: rgba(232,82,26,0.3);
            --color-text: #e8e8ef;
            --color-text-secondary: #8b8b9e;
            --font-primary: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-primary);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            margin-bottom: 3rem;
        }

        .logo img {
            height: 36px;
            opacity: 0.9;
        }

        .card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            max-width: 520px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, var(--color-accent-glow) 0%, transparent 65%);
            pointer-events: none;
        }

        .icon {
            width: 72px;
            height: 72px;
            background: var(--color-accent-glow);
            border: 1px solid var(--color-accent-glow-strong);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.75rem;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            stroke: var(--color-accent);
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 4vw, 2.1rem);
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        p {
            color: var(--color-text-secondary);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            border-radius: 100px;
            font-family: var(--font-primary);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn:hover { opacity: 0.85; transform: translateY(-1px); }

        .btn--primary {
            background: var(--color-accent);
            color: #fff;
        }

        .btn--outline {
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
            margin-top: 0.75rem;
        }

        .btn--outline:hover { color: #fff; border-color: rgba(255,255,255,0.15); }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .timer {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
            margin-top: 1.5rem;
            opacity: 0.6;
        }
